name: Debug railtie test on macos

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: env
        run: |
          echo 'export BUNDLE_WITHOUT="db:job"' >> $GITHUB_ENV

      - name: setup-ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: run test
        run: |
          cd railties
          bin/test test/engine/commands_test.rb

